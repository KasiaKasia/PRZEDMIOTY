<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Manipulacja DOM</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
        }
        button {
            margin: 5px;
            padding: 10px;
        }
        img {
            display: block;
            margin-top: 10px;
            width: 200px;
        }
    </style>
</head>
<body>

    <h2>1. Zmiana treści (innerHTML)</h2>
    <p id="par1">To jest oryginalna treść paragrafu.</p>
    <button onclick="zmienTekst()">Zmień tekst</button>

    <h2>2. Zmiana atrybutu bezpośrednio</h2>
    <img id="obrazek" src="11.jpg" alt="Stary obraz">
    <button onclick="zmienObraz()">Zmień obraz (src)</button>

    <h2>3. setAttribute()</h2>
    <button onclick="zmienAlt()">Zmień alt obrazka</button>

    <script>
        // 1. innerHTML
        function zmienTekst() {
            var paragraf = document.getElementById("par1");
            paragraf.innerHTML = "Nowa treść paragrafu!";
        }

        // 2. zmiana atrybutu bezpo�rednio
        function zmienObraz() {
            var obraz = document.getElementById("obrazek");
            console.log(obraz)
            obraz.src = "22.jpg";
        }

        // 3. setAttribute
        function zmienAlt() {
            var obraz = document.getElementById("obrazek");
            obraz.setAttribute("alt", "Nowy opis obrazka");
            alert("Atrybut ALT zostł zmieniony!");
        }
    </script>

</body>
</html>
