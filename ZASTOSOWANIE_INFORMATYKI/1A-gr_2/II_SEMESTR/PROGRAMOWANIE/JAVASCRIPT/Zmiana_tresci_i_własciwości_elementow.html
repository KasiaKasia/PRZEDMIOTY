<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Manipulacja DOM</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
        }
        button {
            margin: 5px;
            padding: 10px;
        }
        img {
            display: block;
            margin-top: 10px;
            width: 200px;
        }
    </style>
</head>
<body>

    <h2>1. Zmiana treŇõci (innerHTML)</h2>
    <p id="par1">To jest oryginalna treŇõńá paragrafu.</p>
    <button onclick="zmienTekst()">ZmieŇĄ tekst</button>

    <h2>2. Zmiana atrybutu bezpoŇõrednio</h2>
    <img id="obrazek" src="https://via.placeholder.com/200" alt="Stary obraz">
    <button onclick="zmienObraz()">ZmieŇĄ obraz (src)</button>

    <h2>3. setAttribute()</h2>
    <button onclick="zmienAlt()">ZmieŇĄ alt obrazka</button>

    <script>
        // 1. innerHTML
        function zmienTekst() {
            var paragraf = document.getElementById("par1");
            paragraf.innerHTML = "Nowa treŇõńá paragrafu!";
        }

        // 2. zmiana atrybutu bezpoúrednio
        function zmienObraz() {
            var obraz = document.getElementById("obrazek");
            obraz.src = "https://via.placeholder.com/200/ff0000/ffffff?text=Nowy+obraz";
        }

        // 3. setAttribute
        function zmienAlt() {
            var obraz = document.getElementById("obrazek");
            obraz.setAttribute("alt", "Nowy opis obrazka");
            alert("Atrybut ALT zostŇā zmieniony!");
        }
    </script>

</body>
</html>
